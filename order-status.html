<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSA 미네랄 - 주문 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --mint: #e8f5e9;
  --mint-dark: #a5d6a7;
  --sky: #e3f2fd;
  --lavender: #f3e5f5;
  --cream: #fffde7;
  --white: #ffffff;
  --text-primary: #2e3a3f;
  --text-secondary: #607d8b;
  --accent: #43a047;
  --accent-hover: #2e7d32;
  --error: #e53935;
  --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(160deg, var(--mint) 0%, var(--sky) 40%, var(--lavender) 70%, var(--cream) 100%);
  min-height: 100vh;
  color: var(--text-primary);
  line-height: 1.6;
}

.page-wrapper {
  max-width: 700px;
  margin: 0 auto;
  padding: 40px 20px 60px;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.header h1 {
  font-family: 'Outfit', 'Noto Sans KR', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent);
}

.header p {
  color: var(--text-secondary);
  font-size: 0.95rem;
  margin-top: 6px;
}

.header-links {
  margin-top: 12px;
}

.header-links a {
  color: var(--accent);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  padding: 6px 16px;
  border: 1.5px solid var(--accent);
  border-radius: 20px;
  transition: all 0.2s;
}

.header-links a:hover {
  background: var(--accent);
  color: white;
}

.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow-md);
  margin-bottom: 24px;
}

.card-title {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--mint);
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title .icon {
  width: 28px;
  height: 28px;
  background: var(--accent);
  color: white;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group label {
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 6px;
}

.form-group input {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.9rem;
  padding: 12px 14px;
  border: 1.5px solid #e0e0e0;
  border-radius: var(--radius-sm);
  background: #fafafa;
  outline: none;
  transition: all 0.2s;
}

.form-group input:focus {
  border-color: var(--accent);
  background: white;
  box-shadow: 0 0 0 3px rgba(67,160,71,0.12);
}

.btn-search {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), #66bb6a);
  color: white;
  border: none;
  border-radius: 50px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
}

.btn-search:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(67,160,71,0.3);
}

.btn-search:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Results */
.result-section {
  display: none;
}

.result-section.active {
  display: block;
}

.no-result {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}

.no-result .icon {
  font-size: 3rem;
  margin-bottom: 16px;
}

/* Order Card */
.order-card {
  border: 1px solid #e0e0e0;
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 16px;
}

.order-header {
  background: var(--mint);
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

.order-number {
  font-weight: 700;
  color: var(--accent-hover);
}

.order-date {
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.order-body {
  padding: 20px;
}

.order-info-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #f5f5f5;
  font-size: 0.9rem;
}

.order-info-row:last-child {
  border-bottom: none;
}

.order-info-row .label {
  color: var(--text-secondary);
  font-weight: 500;
}

.order-info-row .value {
  font-weight: 600;
  text-align: right;
}

/* Status Tracker */
.status-tracker {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 2px solid var(--mint);
}

.status-tracker h4 {
  font-size: 0.95rem;
  margin-bottom: 20px;
  color: var(--text-primary);
}

.status-steps {
  display: flex;
  justify-content: space-between;
  position: relative;
}

.status-steps::before {
  content: '';
  position: absolute;
  top: 20px;
  left: 10%;
  right: 10%;
  height: 4px;
  background: #e0e0e0;
  z-index: 0;
}

.status-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 1;
  flex: 1;
}

.step-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #e0e0e0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  margin-bottom: 8px;
  transition: all 0.3s;
}

.status-step.active .step-icon {
  background: var(--accent);
  color: white;
  box-shadow: 0 4px 12px rgba(67,160,71,0.3);
}

.status-step.completed .step-icon {
  background: var(--accent);
  color: white;
}

.step-label {
  font-size: 0.75rem;
  color: var(--text-secondary);
  text-align: center;
  font-weight: 500;
}

.status-step.active .step-label,
.status-step.completed .step-label {
  color: var(--accent-hover);
  font-weight: 600;
}

.step-date {
  font-size: 0.7rem;
  color: #999;
  margin-top: 4px;
}

/* Progress line fill */
.status-progress-fill {
  position: absolute;
  top: 20px;
  left: 10%;
  height: 4px;
  background: var(--accent);
  z-index: 0;
  transition: width 0.5s ease;
}

/* Tracking Number */
.tracking-info {
  margin-top: 20px;
  padding: 16px;
  background: #f8f9fa;
  border-radius: var(--radius-sm);
}

.tracking-info h5 {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.tracking-number {
  font-family: 'Outfit', monospace;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
}

.tracking-number a {
  font-size: 0.85rem;
  color: var(--accent);
  text-decoration: none;
  padding: 4px 12px;
  border: 1px solid var(--accent);
  border-radius: 20px;
}

.tracking-number a:hover {
  background: var(--accent);
  color: white;
}

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #e0e0e0;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: white;
  padding: 14px 28px;
  border-radius: 50px;
  font-size: 0.9rem;
  z-index: 3000;
  display: none;
}

@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  .status-steps { gap: 4px; }
  .step-icon { width: 32px; height: 32px; font-size: 0.9rem; }
  .step-label { font-size: 0.7rem; }
}
</style>
</head>
<body>
<div class="page-wrapper">
  <div class="header">
    <h1>📦 주문 조회</h1>
    <p>주문 상태 및 배송 현황을 확인하세요</p>
    <div class="header-links">
      <a href="index.html">🛒 주문하기</a>
    </div>
  </div>

  <!-- Search Form -->
  <div class="card">
    <div class="card-title">
      <span class="icon">🔍</span>
      주문 조회
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>주문자 이름</label>
        <input type="text" id="searchName" placeholder="홍길동" />
      </div>
      <div class="form-group">
        <label>주문자 전화번호</label>
        <input type="tel" id="searchPhone" placeholder="010-1234-5678" />
      </div>
    </div>
    <button class="btn-search" id="btnSearch" onclick="searchOrder()">
      주문 조회하기
    </button>
  </div>

  <!-- Loading -->
  <div class="card loading" id="loadingSection" style="display:none;">
    <div class="loading-spinner"></div>
    <p>주문 정보를 조회하고 있습니다...</p>
  </div>

  <!-- Results -->
  <div class="result-section" id="resultSection">
    <!-- Orders will be rendered here -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/************************************************************
 * ⚠️ 설정: Google Apps Script 웹 앱 URL
 ************************************************************/
const SHEET_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL';

const STATUS_MAP = {
  '주문접수': { step: 0, icon: '📝' },
  '입금확인': { step: 1, icon: '✅' },
  '배송준비': { step: 2, icon: '📦' },
  '발송완료': { step: 3, icon: '🚚' },
  '배송완료': { step: 4, icon: '🎉' },
};

const STATUS_LABELS = ['주문접수', '입금확인', '배송준비', '발송완료', '배송완료'];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

async function searchOrder() {
  const name = document.getElementById('searchName').value.trim();
  const phone = document.getElementById('searchPhone').value.trim();

  if (!name || !phone) {
    showToast('이름과 전화번호를 입력해주세요.');
    return;
  }

  document.getElementById('loadingSection').style.display = 'block';
  document.getElementById('resultSection').classList.remove('active');
  document.getElementById('resultSection').innerHTML = '';

  try {
    const url = `${SHEET_URL}?action=search&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}`;
    
    const response = await fetch(url);
    const result = await response.json();

    document.getElementById('loadingSection').style.display = 'none';

    if (result.success && result.orders && result.orders.length > 0) {
      renderOrders(result.orders);
    } else {
      renderNoResult();
    }
  } catch (err) {
    document.getElementById('loadingSection').style.display = 'none';
    
    // Fallback: localStorage에서 최근 주문 확인
    const lastOrder = localStorage.getItem('lastOrder');
    if (lastOrder) {
      const order = JSON.parse(lastOrder);
      if (order.ordererName === name && order.ordererPhone === phone) {
        renderOrders([{
          orderNumber: order.orderNumber,
          timestamp: order.timestamp,
          status: '주문접수',
          amount: '-',
          address: '-',
          trackingNumber: ''
        }]);
        showToast('로컬 저장된 주문 정보를 표시합니다.');
        return;
      }
    }
    
    renderNoResult();
    showToast('조회 중 오류가 발생했습니다.');
  }
}

function renderNoResult() {
  const section = document.getElementById('resultSection');
  section.innerHTML = `
    <div class="card">
      <div class="no-result">
        <div class="icon">😢</div>
        <h3>주문 내역이 없습니다</h3>
        <p>입력하신 정보와 일치하는 주문을 찾을 수 없습니다.<br/>이름과 전화번호를 다시 확인해주세요.</p>
      </div>
    </div>
  `;
  section.classList.add('active');
}

function renderOrders(orders) {
  const section = document.getElementById('resultSection');
  section.innerHTML = orders.map(order => createOrderCard(order)).join('');
  section.classList.add('active');
}

function createOrderCard(order) {
  const status = order.status || '주문접수';
  const statusInfo = STATUS_MAP[status] || STATUS_MAP['주문접수'];
  const currentStep = statusInfo.step;
  
  // Progress width calculation
  const progressWidth = currentStep === 0 ? 0 : (currentStep / (STATUS_LABELS.length - 1)) * 80;

  const statusStepsHTML = STATUS_LABELS.map((label, idx) => {
    let stepClass = '';
    if (idx < currentStep) stepClass = 'completed';
    else if (idx === currentStep) stepClass = 'active';
    
    const icon = STATUS_MAP[label]?.icon || '⭕';
    
    return `
      <div class="status-step ${stepClass}">
        <div class="step-icon">${icon}</div>
        <div class="step-label">${label}</div>
      </div>
    `;
  }).join('');

  const trackingHTML = order.trackingNumber ? `
    <div class="tracking-info">
      <h5>운송장 번호</h5>
      <div class="tracking-number">
        ${order.trackingNumber}
        <a href="https://trace.cjlogistics.com/web/detail.jsp?slipno=${order.trackingNumber}" target="_blank">배송조회</a>
      </div>
    </div>
  ` : '';

  return `
    <div class="card order-card">
      <div class="order-header">
        <span class="order-number">${order.orderNumber || 'MSA-' + Date.now()}</span>
        <span class="order-date">${formatDate(order.timestamp)}</span>
      </div>
      <div class="order-body">
        <div class="order-info-row">
          <span class="label">주문 상태</span>
          <span class="value" style="color: var(--accent);">${status}</span>
        </div>
        <div class="order-info-row">
          <span class="label">송금 금액</span>
          <span class="value">${order.amount || '-'} USDT</span>
        </div>
        <div class="order-info-row">
          <span class="label">배송지</span>
          <span class="value">${order.address || '-'}</span>
        </div>
        
        <div class="status-tracker">
          <h4>📍 배송 진행 상황</h4>
          <div class="status-steps">
            <div class="status-progress-fill" style="width: ${progressWidth}%;"></div>
            ${statusStepsHTML}
          </div>
        </div>
        
        ${trackingHTML}
      </div>
    </div>
  `;
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  try {
    const d = new Date(dateStr);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  } catch {
    return dateStr;
  }
}

// 페이지 로드 시 localStorage에서 마지막 주문 정보 자동 입력
document.addEventListener('DOMContentLoaded', function() {
  const lastOrder = localStorage.getItem('lastOrder');
  if (lastOrder) {
    try {
      const order = JSON.parse(lastOrder);
      document.getElementById('searchName').value = order.ordererName || '';
      document.getElementById('searchPhone').value = order.ordererPhone || '';
    } catch {}
  }
});
</script>
</body>
</html>
