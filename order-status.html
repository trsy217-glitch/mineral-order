<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>주문 조회 - 오륜 미네랄</title>

<!-- 카카오톡/SNS 공유 시 미리보기 -->
<meta property="og:type" content="website">
<meta property="og:title" content="미네랄 주문하기">
<meta property="og:description" content="신체의 완벽한 조화를 만드는">
<meta property="og:image" content="product-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="미네랄 주문하기">
<meta name="twitter:description" content="신체의 완벽한 조화를 만드는">
<meta name="twitter:image" content="product-image.png">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#43a047;--accent-hover:#2e7d32;--mint:#e8f5e9;--white:#fff;--text:#2e3a3f;--text2:#607d8b;--radius:16px}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,#e8f8e0,#e3f2fd 50%,#f3e5f5);min-height:100vh;color:var(--text)}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px 40px}

.header{text-align:center;margin-bottom:24px}
.header-img{width:100px;height:100px;object-fit:cover;border-radius:50%;margin-bottom:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.header h1{font-size:1.4rem;font-weight:700;color:var(--accent)}
.header p{color:var(--text2);font-size:.85rem;margin-top:4px}
.header-link{margin-top:12px}
.header-link a{color:var(--accent);text-decoration:none;font-size:.85rem;padding:8px 18px;border:2px solid var(--accent);border-radius:25px;font-weight:500}

.card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:16px}
.card-title{font-size:1rem;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--mint);display:flex;align-items:center;gap:8px}
.card-title .icon{width:26px;height:26px;background:var(--accent);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8rem}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-group{flex:1;display:flex;flex-direction:column}
.form-group label{font-size:.8rem;font-weight:600;margin-bottom:6px}
.form-group input{font-family:inherit;font-size:16px;padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fafafa;outline:none}
.form-group input:focus{border-color:var(--accent);background:#fff}
.btn-search{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#66bb6a);color:#fff;border:none;border-radius:50px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:8px}
.btn-search:disabled{opacity:.6}

.result{display:none}
.result.active{display:block}
.no-result{text-align:center;padding:40px 20px;color:var(--text2)}
.no-result .icon{font-size:3rem;margin-bottom:12px}

.order-card{border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;margin-bottom:16px}
.order-header{background:var(--mint);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.order-num{font-weight:700;color:var(--accent-hover);font-size:.9rem}
.order-date{font-size:.8rem;color:var(--text2)}
.order-body{padding:16px}
.order-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5;font-size:.9rem}
.order-row:last-child{border-bottom:none}
.order-row .label{color:var(--text2)}
.order-row .value{font-weight:600;text-align:right}

.status-tracker{margin-top:20px;padding-top:16px;border-top:2px solid var(--mint)}
.status-tracker h4{font-size:.9rem;margin-bottom:20px;color:var(--text)}
.status-steps{display:flex;justify-content:space-between;position:relative;padding:0 10px}
.status-steps::before{content:'';position:absolute;top:20px;left:30px;right:30px;height:4px;background:#e0e0e0;border-radius:2px}
.status-step{display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;flex:1}
.step-icon{width:40px;height:40px;border-radius:50%;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:8px;transition:all .3s}
.status-step.active .step-icon,.status-step.done .step-icon{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(67,160,71,0.3)}
.step-label{font-size:.7rem;color:var(--text2);text-align:center;line-height:1.3}
.status-step.active .step-label,.status-step.done .step-label{color:var(--accent-hover);font-weight:600}

.tracking{margin-top:20px;padding:16px;background:linear-gradient(135deg,#e3f2fd,#bbdefb);border-radius:12px}
.tracking h5{font-size:.85rem;color:#1565c0;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tracking-num{font-family:monospace;font-size:1.1rem;font-weight:700;color:#0d47a1;margin-bottom:12px;word-break:break-all}
.tracking-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-track{padding:10px 16px;border-radius:25px;font-size:.85rem;font-weight:600;text-decoration:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-track.cj{background:#d32f2f;color:#fff}
.btn-track.lotte{background:#e65100;color:#fff}
.btn-track.hanjin{background:#1565c0;color:#fff}
.btn-track.post{background:#43a047;color:#fff}

.loading{text-align:center;padding:40px}
.loading-spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:50px;font-size:.85rem;z-index:3000;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <img src="product-image.png" alt="오륜 미네랄" class="header-img">
    <h1>📦 주문 조회</h1>
    <p>주문 상태 및 배송 추적</p>
    <div class="header-link"><a href="index.html">🛒 주문하기</a></div>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">🔍</span>주문 조회</div>
    <div class="form-row">
      <div class="form-group"><label>주문자 이름</label><input type="text" id="searchName" placeholder="홍길동"></div>
      <div class="form-group"><label>전화번호</label><input type="tel" id="searchPhone" inputmode="tel" placeholder="010-0000-0000" maxlength="13" oninput="formatPhone(this)"></div>
    </div>
    <button class="btn-search" onclick="searchOrder()">주문 조회하기</button>
  </div>

  <div class="card loading" id="loading" style="display:none">
    <div class="loading-spinner"></div>
    <p>조회 중...</p>
  </div>

  <div class="result" id="result"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbz02I8uwK30NarGzM7C3iYUgp7DzXBmtboxKg9oNLU8ze5AcYoxcXTjKPwPzg19a8h8/exec';

var STATUS_MAP = {
  '주문접수': {step:0, icon:'📝'},
  '입금확인': {step:1, icon:'✅'},
  '배송준비': {step:2, icon:'📦'},
  '발송완료': {step:3, icon:'🚚'},
  '배송완료': {step:4, icon:'🎉'}
};
var STATUS_LABELS = ['주문접수','입금확인','배송준비','발송완료','배송완료'];

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 3000);
}

// 전화번호 자동 포맷
function formatPhone(input) {
  var num = input.value.replace(/[^0-9]/g, '');
  var result = '';
  if (num.length <= 3) {
    result = num;
  } else if (num.length <= 7) {
    result = num.slice(0,3) + '-' + num.slice(3);
  } else {
    result = num.slice(0,3) + '-' + num.slice(3,7) + '-' + num.slice(7,11);
  }
  input.value = result;
}

window.handleSearch = function(result) {
  document.getElementById('loading').style.display = 'none';
  if (result.success && result.orders && result.orders.length > 0) {
    renderOrders(result.orders);
  } else {
    renderNoResult();
  }
};

function searchOrder() {
  var name = document.getElementById('searchName').value.trim();
  var phone = document.getElementById('searchPhone').value.trim();
  if (!name || !phone) { toast('이름과 전화번호 입력'); return; }

  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').classList.remove('active');
  document.getElementById('result').innerHTML = '';

  // localStorage 확인
  var lastOrder = localStorage.getItem('lastOrder');
  if (lastOrder) {
    try {
      var order = JSON.parse(lastOrder);
      if (order.ordererName === name && order.ordererPhone === phone) {
        document.getElementById('loading').style.display = 'none';
        renderOrders([{
          orderNumber: order.orderNumber,
          timestamp: order.timestamp,
          status: '주문접수',
          amount: order.payAmount || '',
          address: '-',
          trackingNumber: ''
        }]);
      }
    } catch(e) {}
  }

  // JSONP 요청
  if (SHEET_URL && SHEET_URL.indexOf('script.google.com') !== -1) {
    var script = document.createElement('script');
    script.src = SHEET_URL + '?action=search&name=' + encodeURIComponent(name) + '&phone=' + encodeURIComponent(phone) + '&callback=handleSearch';
    script.onerror = function() {
      document.getElementById('loading').style.display = 'none';
    };
    document.body.appendChild(script);
    
    setTimeout(function() {
      document.getElementById('loading').style.display = 'none';
    }, 10000);
  }
}

function renderNoResult() {
  var r = document.getElementById('result');
  r.innerHTML = '<div class="card"><div class="no-result"><div class="icon">😢</div><h3>주문 내역 없음</h3><p>이름과 전화번호를 확인해주세요.</p></div></div>';
  r.classList.add('active');
}

function renderOrders(orders) {
  var r = document.getElementById('result');
  r.innerHTML = orders.map(createCard).join('');
  r.classList.add('active');
}

function createCard(order) {
  var status = order.status || '주문접수';
  var info = STATUS_MAP[status] || STATUS_MAP['주문접수'];
  var step = info.step;

  var stepsHTML = STATUS_LABELS.map(function(label, idx) {
    var cls = '';
    if (idx < step) cls = 'done';
    else if (idx === step) cls = 'active';
    var icon = STATUS_MAP[label] ? STATUS_MAP[label].icon : '⭕';
    return '<div class="status-step ' + cls + '"><div class="step-icon">' + icon + '</div><div class="step-label">' + label + '</div></div>';
  }).join('');

  var trackingHTML = '';
  if (order.trackingNumber && order.trackingNumber.trim()) {
    var tn = order.trackingNumber.trim();
    trackingHTML = '<div class="tracking">' +
      '<h5>🚚 운송장 번호</h5>' +
      '<div class="tracking-num">' + tn + '</div>' +
      '<div class="tracking-btns">' +
        '<a href="https://trace.cjlogistics.com/web/detail.jsp?slipno=' + tn + '" target="_blank" class="btn-track cj">CJ대한통운</a>' +
        '<a href="https://www.lotteglogis.com/home/reservation/tracking/link498?InvNo=' + tn + '" target="_blank" class="btn-track lotte">롯데택배</a>' +
        '<a href="https://www.hanjin.com/kor/CMS/DeliveryMgr/WaybillResult.do?wblnumString2=' + tn + '" target="_blank" class="btn-track hanjin">한진택배</a>' +
        '<a href="https://service.epost.go.kr/trace.RetrieveDomRi498Trace.do?sid1=' + tn + '" target="_blank" class="btn-track post">우체국</a>' +
      '</div>' +
    '</div>';
  }

  var amountDisplay = order.amount ? order.amount + ' USDT' : '-';

  return '<div class="card order-card">' +
    '<div class="order-header">' +
      '<span class="order-num">' + (order.orderNumber || '-') + '</span>' +
      '<span class="order-date">' + formatDate(order.timestamp) + '</span>' +
    '</div>' +
    '<div class="order-body">' +
      '<div class="order-row"><span class="label">주문 상태</span><span class="value" style="color:var(--accent)">' + status + '</span></div>' +
      '<div class="order-row"><span class="label">송금 금액</span><span class="value">' + amountDisplay + '</span></div>' +
      '<div class="order-row"><span class="label">배송지</span><span class="value">' + (order.address || '-') + '</span></div>' +
      '<div class="status-tracker">' +
        '<h4>📍 배송 진행 상황</h4>' +
        '<div class="status-steps">' + stepsHTML + '</div>' +
      '</div>' +
      trackingHTML +
    '</div>' +
  '</div>';
}

function formatDate(d) {
  if (!d) return '-';
  try {
    var date = new Date(d);
    return date.getFullYear() + '.' + String(date.getMonth()+1).padStart(2,'0') + '.' + String(date.getDate()).padStart(2,'0');
  } catch(e) { return d; }
}

document.addEventListener('DOMContentLoaded', function() {
  var lastOrder = localStorage.getItem('lastOrder');
  if (lastOrder) {
    try {
      var order = JSON.parse(lastOrder);
      document.getElementById('searchName').value = order.ordererName || '';
      document.getElementById('searchPhone').value = order.ordererPhone || '';
    } catch(e) {}
  }
});
</script>
</body>
</html>
